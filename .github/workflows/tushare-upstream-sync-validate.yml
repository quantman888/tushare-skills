name: Tushare Upstream Sync Validate

on:
  pull_request:
    branches:
      - "**"
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review

permissions:
  contents: read
  pull-requests: read

jobs:
  validate_sync:
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.head_ref == 'automation/tushare-upstream-sync' &&
      github.base_ref == github.event.repository.default_branch
    name: Validate Upstream Sync Merge
    runs-on:
      - self-hosted
      - linux
      - x64
    timeout-minutes: 15
    defaults:
      run:
        shell: bash
    steps:
      - name: Resolve pull request mergeability
        id: mergeable
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail

          pr_json=""
          mergeable="null"
          for _ in {1..10}; do
            pr_json="$(gh api \
              -H 'Accept: application/vnd.github+json' \
              "repos/${REPOSITORY}/pulls/${PR_NUMBER}")"
            mergeable="$(jq -r '.mergeable' <<< "${pr_json}")"
            if [[ "${mergeable}" != "null" ]]; then
              break
            fi
            sleep 3
          done

          mergeable_state="$(jq -r '.mergeable_state // "unknown"' <<< "${pr_json}")"
          clean="false"
          if [[ "${mergeable}" == "true" ]]; then
            clean="true"
          fi

          {
            echo "clean=${clean}"
            echo "mergeable=${mergeable}"
            echo "mergeable_state=${mergeable_state}"
            echo "head_sha=${{ github.event.pull_request.head.sha }}"
            echo "base_sha=${{ github.event.pull_request.base.sha }}"
          } >> "${GITHUB_OUTPUT}"

          if [[ "${clean}" != "true" ]]; then
            echo "::warning::Upstream sync PR is not cleanly mergeable. Leave the PR open for manual conflict resolution."
          fi

      - name: Checkout pull request merge ref
        if: steps.mergeable.outputs.clean == 'true'
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: refs/pull/${{ github.event.pull_request.number }}/merge
          fetch-depth: 0

      - name: Check Python syntax
        if: steps.mergeable.outputs.clean == 'true'
        run: |
          set -euo pipefail
          python3 -m compileall main.py tushare/scripts tushare-data/scripts

      - name: Write workflow summary
        if: ${{ always() }}
        env:
          CLEAN: ${{ steps.mergeable.outputs.clean || 'false' }}
          MERGEABLE: ${{ steps.mergeable.outputs.mergeable || 'unknown' }}
          MERGEABLE_STATE: ${{ steps.mergeable.outputs.mergeable_state || 'unknown' }}
          HEAD_SHA: ${{ steps.mergeable.outputs.head_sha || '' }}
          BASE_SHA: ${{ steps.mergeable.outputs.base_sha || '' }}
        run: |
          set -euo pipefail

          {
            echo "### Tushare Upstream Sync Validate"
            echo ""
            echo "- selected_runner: \`self-hosted,linux,x64\`"
            echo "- mergeable: \`${MERGEABLE}\`"
            echo "- mergeable_state: \`${MERGEABLE_STATE}\`"
            if [[ "${CLEAN}" == 'true' ]]; then
              echo "- validation_target: \`refs/pull/${{ github.event.pull_request.number }}/merge\`"
              if [[ -n "${HEAD_SHA}" ]]; then
                echo "- validated_head_sha: \`${HEAD_SHA}\`"
              fi
              if [[ -n "${BASE_SHA}" ]]; then
                echo "- validated_base_sha: \`${BASE_SHA}\`"
              fi
            else
              echo "- action: waiting for manual conflict resolution"
            fi
          } >> "${GITHUB_STEP_SUMMARY}"
